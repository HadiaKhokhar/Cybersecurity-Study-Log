<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Password with Different Hash Algorithms</title>
</head>

<body>
  <div class="root">
    <!-- MAIN CARD -->
    <div class="card">
      <div class="card-header">
        <h2 class="card-title">Password Strength Validator</h2>
        <p class="card-subtitle">Check your password security</p>
      </div>
      <!-- PASSWORD INPUT WITH TOGGLE -->
      <div class="input-wrapper">
        <label class="field-label" for="pwd">Enter password</label>
        <input class="password-input" id="pwd" type="password" placeholder="Type your password…" autocomplete="off" />
        <button class="toggle-btn" id="toggleBtn" type="button" aria-label="Toggle password visibility"
          title="Show password">
          <!-- Eye icon (visible) -->
          <svg class="toggle-icon eye-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              d="M2.458 12C3.732 7.943 7.523 5 12 5s8.268 2.943 9.542 7c-1.274 4.057-5.065 7-9.542 7S3.732 16.057 2.458 12z" />
          </svg>
          <!-- Eye slash icon (hidden) -->
        <svg class="toggle-icon eye-slash-icon hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.956 9.956 0 012.042-3.368M6.223 6.223A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.542 7a9.978 9.978 0 01-4.293 5.087M15 12a3 3 0 00-3-3m0 0a3 3 0 00-3 3m3-3v3m0 0a3 3 0 003 3m-3-3a3 3 0 01-3 3M3 3l18 18" />
        </svg>
        </button>
      </div>

      <div class="btn-row">
        <button id="validateBtn" class="btn btn-primary">Validate</button>
        <button id="clearBtn" class="btn btn-secondary">Clear</button>
      </div>

      <div class="divider"></div>

      <p class="section-title">Hash algorithms</p>

      <div class="hash-grid">
        <!-- MD5 -->
        <div class="hash-box">
          <div class="hash-box-label md5-label">
            MD5 <span class="badge badge-weak">Broken</span>
          </div>
          <!-- MD5 HASH -->
          <p id="md5Hash" class="hash-placeholder">Hash will appear here</p>
        </div>
        <!-- SHA-256 -->
        <div class="hash-box">
          <div class="hash-box-label sha-label">
            SHA-256 <span class="badge badge-legacy">Legacy</span>
          </div>
          <!-- SHA-256 HASH -->
          <p id="sha256Hash" class="hash-placeholder">Hash will appear here</p>
        </div>
        <!-- bcrypt -->
        <div class="hash-box">
          <div class="hash-box-label bcrypt-label">
            bcrypt <span class="badge badge-strong">Strong</span>
          </div>
          <!-- bcrypt HASH -->
          <p id="bcryptHash" class="hash-placeholder">Hash will appear here</p>
        </div>
        <!-- Argon2 -->
        <div class="hash-box">
          <div class="hash-box-label argon-label">
            Argon2 <span class="badge badge-strong">Best</span>
          </div>
          <!-- Argon2 HASH -->
          <p id="argon2Hash" class="hash-placeholder">Hash will appear here</p>
        </div>
      </div>

      <div class="divider"></div>
      <!-- BREACH SECTION -->
      <p class="section-title">Breach detection</p>

      <div class="breach-box">
        <!-- BREACH ICON -->
        <div class="breach-icon">
          <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 1.5L2 4v4c0 3.5 2.5 6 6 7 3.5-1 6-3.5 6-7V4L8 1.5z" stroke="#d32f2f" stroke-width="1.2"
              stroke-linejoin="round" />
            <path d="M5.5 8l1.5 1.5L10.5 6" stroke="#d32f2f" stroke-width="1.2" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </div>
        <div>
          <p class="breach-label">Breach Status</p>

          <p id="breachResult" class="breach-placeholder">Result will appear here</p>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/argon2-browser@1.18.0/dist/argon2-bundled.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script src="script.js"></script>
</body>

</html>
